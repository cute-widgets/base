<app-component-viewer
  [(docItem)]="_docItem"
  [examplesTemplate]="badgeExamples">
</app-component-viewer>

<ng-template #badgeExamples>

  <cute-vstack gap="2">
    <h1>Example heading <cute-badge color="secondary">New</cute-badge></h1>
    <h2>Example heading <cute-badge color="secondary">New</cute-badge></h2>
    <h3>Example heading <cute-badge color="secondary">New</cute-badge></h3>
    <h4>Example heading <cute-badge color="secondary">New</cute-badge></h4>
    <h5>Example heading <cute-badge color="secondary">New</cute-badge></h5>
    <h6>Example heading <cute-badge color="secondary">New</cute-badge></h6>

    <button cuteButton="flat-button" color="primary" style="width: 9rem">
      Notifications
      <cute-badge color="danger">5</cute-badge>
    </button>

    <a cuteButton="pill-button" color="warning-emphasis" style="width: 8rem">
      Warning
      <cute-badge roundedPill color="danger">5</cute-badge>
    </a>

    <h6 class="my-3">Positioned</h6>

    <cute-hstack gap="2" class="px-3">
      <button cuteButton="flat-button" color="primary">
        Profile
        <cute-badge position="top-start" roundedPill color="danger" aria-description="Unread messages">99+</cute-badge>
      </button>
      <button cuteButton="flat-button" color="primary">
        Profile
        <cute-badge position="top-end" roundedPill color="danger" aria-description="Unread messages">99+</cute-badge>
      </button>
    </cute-hstack>
    <cute-hstack gap="2" class="px-3">
      <button cuteButton="flat-button" color="primary">
        Profile
        <cute-badge position="bottom-start" roundedPill color="danger" aria-description="Unread messages">99+</cute-badge>
      </button>
      <button cuteButton="flat-button" color="primary">
        Profile
        <cute-badge position="bottom-end" roundedPill color="danger" aria-description="Unread messages">99+</cute-badge>
      </button>
    </cute-hstack>

  </cute-vstack>

</ng-template>
